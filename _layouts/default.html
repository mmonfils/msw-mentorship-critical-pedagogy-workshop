<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <!-- Favicon for browser tab -->
  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">

  <!-- Thumbnail / Open Graph Preview Image for URL sharing -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:image" content="{{ '/thumbnail.jpg' | relative_url }}">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:image" content="{{ '/thumbnail.jpg' | relative_url }}">

  <!-- Jekyll Cayman Theme CSS (or site default stylesheet) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>
  <section class="page-header">
    <h1 class="project-name">{{ site.title | default: site.github.repository_name }}</h1>
    <h2 class="project-tagline">{{ site.description | default: site.github.project_tagline }}</h2>
  </section>

  <section class="main-content">
    {{ content }}

    <footer class="site-footer">
      <span class="site-footer-owner">{{ site.title }} is maintained by the community.</span>
    </footer>
  </section>
</body>
</html>
